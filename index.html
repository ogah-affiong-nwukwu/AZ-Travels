<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AZ Travels</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />">
</head>
<body>
    
    <section>

        <!-- the top side -->
        <div class="hero-section">
            
            <div class="logo-header-section">
                <!-- logo and about -->
                <div class="logo-section">

                    <div class="logo">
                        <h1>AZ</h1>
                        <h6>Travels</h6>
                    </div>
                
                    <div class="about">

                        <ul>
                            <li><a href="#">Home</a></li>
                            <li><a href="#">Destinations</a></li>
                            <li><a href="#">Packages</a></li>
                            <li><a href="#">About Us</a></li>
                            <li><a href="#">Contact</a></li>
                        </ul>
                    </div>

                </div>

                <!-- button book section -->
                <div class="booking-section">
                    <button class="green">
                    Book Now
                    <i class="fa-solid fa-plane-departure"></i>
                    </button>
                </div>
            </div>

            <!-- hero image section, rem to us 80vh and the image as background image -->

            <div class="hero-writeup-button">
                <div class="hero-writeup">
                    <h2>Explore the world with</h2>
                    <h1>AZ Travels</h1>
                    <h6>Collect Memories, not things</h6>
                    <p>Let's make your next adventure unforgettable!</p>
                </div>

                <div class="hero-button">
                    <button class="green">
                        <i class="fa-solid fa-plane-departure"></i>
                        Explore Destinations
                    </button>

                    <button class="transparent">
                        <i class="fa-regular fa-calendar-check"></i>
                        Book a Trip
                    </button>
                </div>
            </div>

            <!-- this is for the text below the image, popular destinations -->
            <div class="hero-quote">
                <h3>Popular Destinations</h3>
                <div class="palm-divider">
                    <i class="fa-solid fa-palm-tree"></i>
                </div>
            </div>

        </div>

        <div class="body-section">


        </div>
    </section>
</body>
</html>
